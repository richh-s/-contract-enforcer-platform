kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 2.0.0
  owner: week3-team
  description: >
    v2 schema. confidence scale changed to 0–100 (BREAKING).
    extracted_facts.fact renamed to extracted_facts.text (BREAKING).
    New nullable field extraction_pipeline_version added.
  generatedAt: '2026-04-02T09:00:00.000000+00:00'
  sourceFile: outputs/week3/extractions_violated.jsonl
  sourceType: week3
servers:
  local:
    type: local
    path: outputs/week3/extractions_violated.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: >
    BREAKING: confidence is now 0–100 (was 0.0–1.0 in v1).
    This breaks Week4 attribution weights — rescale before consuming.
schema:
  doc_id:
    type: string
    pattern: ^[a-f0-9]{64}$
    required: true
    unique: true
    description: Primary key. SHA-256 hex digest. Unchanged from v1.
  source_hash:
    type: string
    pattern: ^[a-f0-9]{64}$
    required: true
    description: SHA-256 of source file.
  extracted_facts:
    type: array
    required: true
    items:
      confidence:
        type: number
        minimum: 0.0
        maximum: 100.0
        required: true
        description: >
          BREAKING v2: confidence scale is now 0–100 (was 0.0–1.0 in v1).
          Downstream week4 attribution weights must divide by 100 before use.
      text:
        type: string
        required: true
        description: >
          BREAKING v2: renamed from 'fact' to 'text'. Consumers using
          extracted_facts[*].fact will receive KeyError at runtime.
      fact_id:
        type: string
        format: uuid
        unique: true
        description: UUID v4 identifying this fact. Unchanged from v1.
  extraction_model:
    type: string
    pattern: ^(claude|gpt)-
    required: true
    description: LLM model identifier. Unchanged from v1.
  extraction_pipeline_version:
    type: string
    required: false
    nullable: true
    description: >
      New in v2. Version string of the extraction pipeline.
      Nullable until all pipeline versions emit this field.
quality:
  type: SodaChecks
  specification:
    checks for week3_document_refinery_extractions:
    - row_count > 0: null
    - missing_count(doc_id) = 0: null
    - missing_count(extraction_model) = 0: null
    - min(extracted_facts[*].confidence) >= 0.0: null
    - max(extracted_facts[*].confidence) <= 100.0: null
  structural:
  - rule: confidence_range_0_100
    field: extracted_facts[*].confidence
    type: range
    minimum: 0.0
    maximum: 100.0
    severity: BREAKING
    description: v2 confidence is 0–100. Consumers expecting 0.0–1.0 must rescale.
  - rule: text_not_null
    field: extracted_facts[*].text
    type: structural
    check: not_null
    severity: BREAKING
    description: Renamed from 'fact'. Non-null required.
lineage:
  snapshot_id: S-003
  timestamp: '2026-04-02T09:00:00.000000'
  upstream: []
  downstream:
  - id: week4-cartographer
    description: Cartographer ingests doc_id and extracted_facts as node metadata
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    breaking_if_changed:
    - extracted_facts.confidence
    - doc_id
  git_commit: a1b2c3d4e5f6
  git_author: richh-s
  git_committed_at: '2026-04-02T09:00:00+03:00'
  git_message: v2 schema — confidence 0-100, rename fact to text
llm_annotations:
  status: skipped
  reason: missing_api_key
  model: null
  annotations: []
