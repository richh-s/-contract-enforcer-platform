kind: DataContract
apiVersion: v3.0.0
id: urn:contract:week3-extractions:v1
info:
  title: Week3 Extractions Data Contract
  version: 1.0.0
  owner: contract-enforcer-platform
  generatedAt: '2026-04-01T12:38:50.392870+00:00'
  sourceFile: outputs/week3/extractions.jsonl
  sourceType: week3
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish externally.
  limitations: confidence must remain in 0.0–1.0 float range. Schema evolution must
    follow backward-compatibility rules. Breaking changes require a version bump.
models:
  week3_extractions:
    description: Profile of outputs/week3/extractions.jsonl (week3 pipeline output).
    fields:
      doc_id:
        type: string
        required: true
        nullable: false
        description: Inferred from profile. null_fraction=0.000, n_unique=50
        format: hex64-sha256
      fact:
        type: string
        required: true
        nullable: false
        description: Inferred from profile. null_fraction=0.000, n_unique=17221
      confidence:
        type: number
        required: true
        nullable: false
        description: Inferred from profile. null_fraction=0.000, n_unique=1
        minimum: 0.9
        maximum: 0.9
quality:
  type: SodaChecks
  specification:
    checks for week3_extractions:
    - row_count > 0: null
    - missing_count(doc_id) = 0: null
    - duplicate_count(doc_id) > 0: warn
    - missing_count(fact) = 0: null
    - missing_count(confidence) = 0: null
    - min(confidence) >= 0.0: null
    - max(confidence) <= 1.0: null
  structural:
  - rule: doc_id_hex64
    field: doc_id
    type: pattern
    pattern: ^[0-9a-f]{64}$
    severity: BREAKING
    description: doc_id must be a 64-character lowercase SHA-256 hex digest. Each
      document is identified by the SHA-256 hash of its content.
  - rule: fact_not_null
    field: fact
    type: structural
    check: not_null
    severity: BREAKING
    description: fact is the extracted text fragment. It must be present and non-empty
      for every row.
  - rule: doc_id_not_null
    field: doc_id
    type: structural
    check: not_null
    severity: BREAKING
    description: doc_id must be present on every row. It links every fact back to
      its source document.
  - rule: confidence_not_null
    field: confidence
    type: structural
    check: not_null
    severity: BREAKING
    description: confidence must be present. Missing confidence cannot be compared
      against threshold contracts.
  - rule: entities_type_enum
    field: entities
    type: accepted_values
    accepted_values:
    - PERSON
    - ORG
    - LOCATION
    - DATE
    - MONEY
    - FACT
    - OTHER
    severity: WARNING
    status: aspirational
    description: 'Aspirational clause: once an ''entities'' field is added to the
      schema, entity types must use the canonical enum. Not enforced until the field
      is present.'
  - rule: doc_id_hex64_format
    field: doc_id
    type: pattern
    pattern: ^[0-9a-f]{64}$
    severity: ERROR
    description: '''doc_id'' contains 64-char lowercase hex values in all observed
      rows. Inferred as SHA-256 digest field.'
    source: inferred
  statistical:
  - rule: confidence_non_zero_variance
    field: confidence
    type: statistical
    check: non_zero_variance
    severity: WARNING
    description: If all confidence values are identical the extractor is likely returning
      a hard-coded default. std=0 is a data quality signal.
  crossField: []
lineage:
  snapshot_id: S-001
  timestamp: '2026-03-16T11:11:59.940939'
  node_count: 16
  edge_count: 11
  node_types:
