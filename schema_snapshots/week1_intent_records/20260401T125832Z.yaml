kind: DataContract
apiVersion: v3.0.0
id: week1-intent-records
info:
  title: Week 1 Intent Records
  version: 1.0.0
  owner: week1-team
  description: Intent records produced by the Week 1 mutation-tracking pipeline. Each
    record captures a single tool invocation (apply_patch, bash, etc.) bound to a
    developer intent, with outcome, file path, and content hash. Downstream consumers
    use these records for attribution and audit.
  generatedAt: '2026-04-01T12:58:32.429426+00:00'
  sourceFile: outputs/week1/intent_records.jsonl
  sourceType: week1
servers:
  local:
    type: local
    path: outputs/week1/intent_records.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence must remain in 0.0–1.0 float range.
schema:
  id:
    type: string
    format: uuid
    required: true
    nullable: false
  timestamp:
    type: string
    format: date-time
    required: true
    nullable: false
  tool:
    type: string
    required: true
    nullable: false
  intentId:
    type: string
    required: true
    nullable: false
  mutationClass:
    type: string
    required: true
    nullable: false
  mutationType:
    type: string
    required: true
    nullable: false
  filePath:
    type: string
    required: false
    nullable: true
  contentHash:
    type: string
    format: hex64-sha256
    required: false
    nullable: true
  outcome:
    type: string
    required: true
    nullable: false
  revisionId:
    type: string
    required: false
    nullable: true
  fileSizeBytes:
    type: integer
    required: false
    nullable: true
quality:
  type: SodaChecks
  specification:
    checks for intent_records:
    - row_count >= 1
    - missing_count(id) = 0
    - duplicate_count(id) = 0
    - missing_count(intentId) = 0
    - missing_count(timestamp) = 0
    - missing_count(tool) = 0
  structural:
  - rule: id_uuid_format
    field: id
    type: pattern
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    severity: BREAKING
    description: id must be a valid UUID v4. Each intent record must be globally unique.
  - rule: id_not_null
    field: id
    type: structural
    check: not_null
    severity: BREAKING
    description: id must be present on every record.
  - rule: intent_id_not_null
    field: intentId
    type: structural
    check: not_null
    severity: BREAKING
    description: intentId links the mutation to a developer goal. Must be present
      for attribution.
  - rule: timestamp_not_null
    field: timestamp
    type: structural
    check: not_null
    severity: BREAKING
    description: timestamp is required for temporal ordering and replay.
  - rule: tool_not_null
    field: tool
    type: structural
    check: not_null
    severity: BREAKING
    description: tool identifies which agent action was taken.
  - rule: content_hash_hex64
    field: contentHash
    type: pattern
    pattern: ^[0-9a-f]{64}$
    severity: ERROR
    description: contentHash must be a 64-character lowercase SHA-256 hex digest of
      the file content at the time of mutation.
  - rule: outcome_enum
    field: outcome
    type: accepted_values
    accepted_values:
    - success
    - failure
    - partial
    severity: ERROR
    description: outcome must be one of the canonical result states.
  - rule: mutation_type_enum
    field: mutationType
    type: accepted_values
    accepted_values:
    - WRITE
    - READ
    - DELETE
    - EXEC
    severity: WARNING
    description: mutationType must use the canonical enum for consistent downstream
      filtering.
  - rule: timestamp_datetime_format
    field: timestamp
    type: structural
    check: datetime_format
    severity: WARNING
    description: '''timestamp'' contains ISO-8601 datetime strings in all observed
      rows. Inferred as timestamp field.'
    source: inferred
  - rule: tool_accepted_values
    field: tool
    type: accepted_values
    accepted_values:
