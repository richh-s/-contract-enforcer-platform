# contract_registry/subscriptions.yaml
#
# PRIMARY source of truth for all consumer subscriptions.
# This file declares which consumers depend on which contracts,
# what fields they consume, and which fields are breaking-if-changed.
#
# Each entry contains: contract_id, subscriber_id (= consumer_id),
# fields_consumed, breaking_fields with reasons, validation_mode
# (= enforcement_mode), registered_at, and contact.
#
# Usage (spec requirement):
#   The ContractRegistry loads this file FIRST as the authoritative
#   subscription list. The ViolationAttributor reads this file to
#   determine the subscriber list BEFORE any lineage graph traversal.
#   contract-level lineage.downstream adds depth (git context,
#   snapshot IDs) but cannot override subscriptions here.
#
# Breaking field reasoning:
#   A field is "breaking_if_changed" when the consumer has a hard
#   dependency on the field's type, range, or semantics — any schema
#   change to that field requires the consumer to change code or fail.

version: "1.0"
generated_at: "2026-04-01T00:00:00Z"

subscriptions:

  # ──────────────────────────────────────────────────────────────────
  # WEEK 3 → WEEK 4/5/7 — Document Refinery Extractions
  # ──────────────────────────────────────────────────────────────────

  - contract_id: week3-document-refinery-extractions
    consumers:

      - consumer_id: week4-cartographer
        subscriber_id: week4-cartographer
        contact: week4-team@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Cartographer ingests doc_id as node identity and extracted_facts
          as node metadata in the lineage graph. Uses confidence as an edge
          weight for attribution scoring. Any change to the confidence scale
          (e.g., 0–1 → 0–100) silently inflates attribution by 100× without
          any runtime error — a silent corruption failure mode.
        fields_consumed:
          - doc_id
          - extracted_facts
          - extraction_model
        breaking_fields:
          - field: extracted_facts.confidence
            reason: edge weight — scale change is silent corruption (100× inflation)
          - field: doc_id
            reason: node identity — format change breaks graph joins
        breaking_if_changed:
          - extracted_facts.confidence
          - doc_id
        validation_mode: ENFORCE
        enforcement_mode: ENFORCE

      - consumer_id: week5-event-publisher
        subscriber_id: week5-event-publisher
        contact: week5-team@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Event publisher reads confidence to gate DecisionGenerated events.
          A threshold of confidence > 0.7 becomes always-true when confidence
          is on the 0–100 scale, bypassing the quality gate entirely.
        fields_consumed:
          - doc_id
          - confidence
        breaking_fields:
          - field: confidence
            reason: gate logic — scale change disables quality gate (0.7 threshold becomes always-true)
        breaking_if_changed:
          - confidence
        validation_mode: ENFORCE
        enforcement_mode: ENFORCE

      - consumer_id: contract-enforcer-runner
        subscriber_id: contract-enforcer-runner
        contact: platform-infra@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          The validation runner (consumer-side enforcement) reads all fields
          to evaluate contract compliance. Used in AUDIT mode to detect
          violations without blocking the pipeline.
        fields_consumed:
          - doc_id
          - extracted_facts
          - confidence
        breaking_fields:
          - field: doc_id
            reason: primary key for violation record linkage
          - field: extracted_facts.confidence
            reason: range check threshold — scale change causes false negatives
        breaking_if_changed:
          - doc_id
          - extracted_facts.confidence
        validation_mode: AUDIT
        enforcement_mode: AUDIT

  # ──────────────────────────────────────────────────────────────────
  # WEEK 5 → WEEK 7 — Event Stream
  # ──────────────────────────────────────────────────────────────────

  - contract_id: week5-event-stream
    consumers:

      - consumer_id: audit-trail-service
        subscriber_id: audit-trail-service
        contact: audit-team@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Audit service consumes all events for compliance logging and
          accountability. event_type drives routing to the correct audit
          handler. An unknown event_type is dropped, creating audit gaps.
        fields_consumed:
          - event_id
          - event_type
          - timestamp
          - actor_id
          - source_system
          - schema_version
        breaking_fields:
          - field: event_id
            reason: audit record identity
          - field: event_type
            reason: routes to compliance handler — unknown type drops the event
          - field: schema_version
            reason: deserializer routing — mismatch causes parse failure
        breaking_if_changed:
          - event_id
          - event_type
          - schema_version
        validation_mode: ENFORCE
        enforcement_mode: ENFORCE

      - consumer_id: week4-cartographer
        subscriber_id: week4-cartographer
        contact: week4-team@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Cartographer ingests event metadata as graph nodes to build
          the causal event chain.
        fields_consumed:
          - event_id
          - event_type
          - stream_id
          - actor_id
        breaking_fields:
          - field: event_id
            reason: graph node identity
          - field: event_type
            reason: node classification in causal chain
        breaking_if_changed:
          - event_id
          - event_type
        validation_mode: WARN
        enforcement_mode: WARN

      - consumer_id: decision-replay-service
        subscriber_id: decision-replay-service
        contact: replay-team@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Replay service reconstructs decision sequences from the event log.
          Relies on stream_position being monotonically increasing within
          each stream_id. A reset or gap causes replays to produce
          incorrect decision sequences.
        fields_consumed:
          - event_id
          - stream_id
          - stream_position
          - event_type
          - timestamp
        breaking_fields:
          - field: stream_position
            reason: monotonicity — reset causes incorrect replay
          - field: stream_id
            reason: partition key for replay
        breaking_if_changed:
          - stream_position
          - stream_id
        validation_mode: ENFORCE
        enforcement_mode: ENFORCE

  # ──────────────────────────────────────────────────────────────────
  # WEEK 1 — Intent Records
  # ──────────────────────────────────────────────────────────────────

  - contract_id: week1-intent-records
    consumers:

      - consumer_id: week3-document-refinery
        subscriber_id: week3-document-refinery
        contact: week3-team@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Document refinery reads intent records to determine extraction
          scope and target document set.
        fields_consumed:
          - intent_id
          - target_docs
          - extraction_config
        breaking_fields:
          - field: intent_id
            reason: primary key for extraction job linkage
        breaking_if_changed:
          - intent_id
        validation_mode: WARN
        enforcement_mode: WARN

  # ──────────────────────────────────────────────────────────────────
  # WEEK 4 → WEEK 7 — Lineage Snapshots
  # ──────────────────────────────────────────────────────────────────

  - contract_id: week4-lineage-snapshots
    consumers:

      - consumer_id: contract-enforcer-attributor
        subscriber_id: contract-enforcer-attributor
        contact: platform-infra@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          The blame-chain attributor traverses the lineage graph to
          identify which pipeline node introduced a violation.
          Relies on snapshot_id being stable and nodes[].id being unique.
        fields_consumed:
          - snapshot_id
          - nodes
          - edges
        breaking_fields:
          - field: snapshot_id
            reason: attribution key — change breaks blame-chain joins
          - field: nodes
            reason: graph structure — any rename breaks traversal
        breaking_if_changed:
          - snapshot_id
          - nodes
        validation_mode: ENFORCE
        enforcement_mode: ENFORCE

      - consumer_id: schema-evolution-analyzer
        subscriber_id: schema-evolution-analyzer
        contact: platform-infra@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Schema evolution analyzer reads lineage to enrich blast radius
          with pipeline-level impact. Uses downstream consumer declarations
          to identify which nodes are affected by schema changes.
        fields_consumed:
          - snapshot_id
          - downstream
        breaking_fields:
          - field: downstream
            reason: blast radius source — change breaks impact analysis
        breaking_if_changed:
          - downstream
        validation_mode: AUDIT
        enforcement_mode: AUDIT

  # ──────────────────────────────────────────────────────────────────
  # LANGSMITH → WEEK 7 — Traces
  # ──────────────────────────────────────────────────────────────────

  - contract_id: langsmith-traces
    consumers:

      - consumer_id: ai-quality-monitor
        subscriber_id: ai-quality-monitor
        contact: ai-team@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          AI quality monitor reads trace runs to compute model performance
          metrics and detect prompt degradation. total_tokens drives cost
          attribution; run_type drives routing to the correct scorer.
        fields_consumed:
          - run_id
          - run_type
          - total_tokens
          - start_time
          - end_time
          - error
        breaking_fields:
          - field: run_id
            reason: trace identity
          - field: run_type
            reason: scorer routing — unknown type drops the trace
          - field: total_tokens
            reason: cost attribution — null breaks budget reporting
        breaking_if_changed:
          - run_id
          - run_type
          - total_tokens
        validation_mode: WARN
        enforcement_mode: WARN

      - consumer_id: contract-enforcer-runner
        subscriber_id: contract-enforcer-runner
        contact: platform-infra@platform.internal
        registered_at: "2026-04-01T00:00:00Z"
        description: >
          Validation runner audits trace outputs for schema compliance.
          Used in AUDIT mode — violations are logged but pipeline not blocked.
        fields_consumed:
          - run_id
          - run_type
          - total_tokens
        breaking_fields:
          - field: run_id
            reason: audit record identity
        breaking_if_changed:
          - run_id
        validation_mode: AUDIT
        enforcement_mode: AUDIT
